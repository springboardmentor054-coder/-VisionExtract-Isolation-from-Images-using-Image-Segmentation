<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#915aff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="800" height="400" fill="#050a1a" rx="10" />
  
  <!-- Encoder Blocks (Blocks) -->
  <rect x="50" y="150" width="80" height="100" fill="url(#grad1)" rx="5" filter="url(#glow)" />
  <text x="90" y="210" fill="white" font-family="Arial" font-weight="bold" text-anchor="middle" font-size="12">RESNET34</text>
  <text x="90" y="230" fill="white" font-family="Arial" text-anchor="middle" font-size="10">ENCODER</text>
  
  <!-- Decoder Blocks -->
  <rect x="650" y="150" width="80" height="100" fill="url(#grad1)" rx="5" filter="url(#glow)" />
  <text x="690" y="210" fill="white" font-family="Arial" font-weight="bold" text-anchor="middle" font-size="12">UNET</text>
  <text x="690" y="230" fill="white" font-family="Arial" text-anchor="middle" font-size="10">DECODER</text>
  
  <!-- Bottleneck -->
  <path d="M 130 200 L 650 200" stroke="#00d2ff" stroke-width="4" fill="none" marker-end="url(#arrow)" />
  <rect x="350" y="180" width="100" height="40" fill="#030712" stroke="#00d2ff" stroke-width="2" rx="5" />
  <text x="400" y="205" fill="#00d2ff" font-family="Arial" text-anchor="middle" font-size="12">BOTTLENECK</text>
  
  <!-- Skip Connections -->
  <path d="M 90 150 Q 400 50 690 150" stroke="#915aff" stroke-width="2" stroke-dasharray="5,5" fill="none" />
  <text x="400" y="60" fill="#915aff" font-family="Arial" font-size="12" text-anchor="middle">SKIP CONNECTIONS</text>
  
  <!-- Input/Output -->
  <text x="90" y="300" fill="#8892b0" font-family="Arial" font-size="12" text-anchor="middle">INPUT (256x256)</text>
  <text x="690" y="300" fill="#8892b0" font-family="Arial" font-size="12" text-anchor="middle">OUTPUT MASK</text>
  
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#00d2ff" />
    </marker>
  </defs>
</svg>
